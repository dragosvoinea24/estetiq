<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
<script type="module">
import {createClient} from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const s=createClient('https://utljkuefjdvdpmmzxnoi.supabase.co','sb_publishable_dJNniaqWOEVQLDLFms6bDQ_zoaRJqvb')
const u=new URLSearchParams(location.search).get('id')
const{data:{session}}=await s.auth.getSession()
if(!session||session.user.id!==u){location.href='./index.html'}else{
const{data:p}=await s.from('profiles').select('plan_level').eq('id',u).single()
const{data:pr}=await s.from('programs').select('html_content').eq('sort_order',p.plan_level||1).single()
document.open();document.write(pr?.html_content||'Plan inactiv');document.close()}
</script>
</body></html>
