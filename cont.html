<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cont - estetiq.fit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface-2:#1f1f1f;
  --lime:#c6f135;
  --lime-glow:rgba(198,241,53,0.25);
  --text:#ffffff;
  --text-dim:#9a9a9a;
  --border:rgba(255,255,255,0.06);
  --red:#ff3b3b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.bg-anim{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:0;
}
.bg-anim span{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,var(--lime-glow) 0%,transparent 70%);
  animation:float 20s infinite;
}
.bg-anim span:nth-child(1){width:400px;height:400px;top:-200px;left:-200px}
.bg-anim span:nth-child(2){width:300px;height:300px;bottom:-150px;right:-150px;animation-delay:3s}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);opacity:0.3}
  50%{transform:translate(30px,-50px) scale(1.1);opacity:0.5}
}
.container{
  max-width:420px;
  width:100%;
  background:linear-gradient(145deg,rgba(20,20,20,0.9),rgba(31,31,31,0.9));
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:28px;
  padding:40px 28px;
  position:relative;
  z-index:1;
  box-shadow:0 20px 80px rgba(0,0,0,0.6);
}
.logo{
  text-align:center;
  font-size:1.8rem;
  font-weight:900;
  letter-spacing:-1px;
  margin-bottom:8px;
  background:linear-gradient(135deg,var(--lime),#a8d12a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.tagline{
  text-align:center;
  color:var(--text-dim);
  font-size:.85rem;
  margin-bottom:32px;
}
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:24px;
}
.tab{
  flex:1;
  padding:12px;
  background:transparent;
  border:1.5px solid var(--border);
  border-radius:12px;
  color:var(--text-dim);
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:.3s;
}
.tab.active{
  background:var(--lime);
  color:#0a0a0a;
  border-color:var(--lime);
}
.msg{
  display:none;
  padding:12px;
  border-radius:10px;
  font-size:.85rem;
  font-weight:600;
  text-align:center;
  margin-bottom:18px;
}
.msg.err{background:rgba(255,59,59,0.1);color:var(--red);border:1px solid rgba(255,59,59,0.2)}
.msg.ok{background:rgba(198,241,53,0.1);color:var(--lime);border:1px solid rgba(198,241,53,0.2)}
.form{display:none}
.form.active{display:block}
.input-wrap{
  position:relative;
  margin-bottom:14px;
}
.input-wrap svg{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  stroke:var(--text-dim);
  stroke-width:2;
}
.input{
  width:100%;
  padding:14px 14px 14px 44px;
  background:var(--surface-2);
  border:1.5px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:.95rem;
  font-family:'Inter',sans-serif;
  transition:.3s;
}
.input:focus{
  outline:none;
  border-color:var(--lime);
}
.submit{
  width:100%;
  padding:15px;
  background:var(--lime);
  color:#0a0a0a;
  border:none;
  border-radius:12px;
  font-size:1rem;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:12px;
  transition:.3s;
}
.submit:disabled{opacity:.5}
.submit:active{transform:scale(.97)}
.txt-btn{
  width:100%;
  background:none;
  border:none;
  color:var(--text-dim);
  font-size:.85rem;
  font-weight:600;
  cursor:pointer;
  padding:8px;
}
.note{
  text-align:center;
  font-size:.8rem;
  color:var(--text-dim);
  margin-top:16px;
}
.note a{color:var(--lime);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="bg-anim"><span></span><span></span></div>
<div class="container">
  <div class="logo">ESTETIQ.FIT</div>
  <p class="tagline">Intră în contul tău</p>
  
  <div class="tabs">
    <button class="tab active" id="tabL" onclick="switchTab('login')">Login</button>
    <button class="tab" id="tabR" onclick="switchTab('register')">Cont nou</button>
  </div>
  
  <div class="msg" id="mMsg"></div>

  <!-- LOGIN -->
  <div id="fLogin" class="form active">
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="lEmail" class="input" placeholder="Email">
    </div>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="lPass" class="input" placeholder="Parolă">
    </div>
    <button class="submit" id="lSubmit" onclick="doLogin()">
      Intră în cont
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <button class="txt-btn" onclick="switchTab('forgot')">Ai uitat parola?</button>
  </div>

  <!-- REGISTER -->
  <div id="fRegister" class="form">
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="rEmail" class="input" placeholder="Email">
    </div>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="rPass" class="input" placeholder="Parolă (minim 6 caractere)">
    </div>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="rPassC" class="input" placeholder="Confirmă parola">
    </div>
    <button class="submit" onclick="doRegister()">
      Creează cont
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <p class="note">Ai deja cont? <a href="javascript:void(0)" onclick="switchTab('login')">Loghează-te →</a></p>
  </div>

  <!-- FORGOT -->
  <div id="fForgot" class="form">
    <p style="font-size:.83rem;color:var(--text-dim);text-align:center;margin-bottom:16px;">Introdu email-ul și primești link de resetare.</p>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <input type="email" id="fEmail" class="input" placeholder="Email">
    </div>
    <button class="submit" onclick="doForgot()">Trimite link resetare</button>
    <button class="txt-btn" onclick="switchTab('login')">← Înapoi la login</button>
  </div>
  
  <p class="note" style="margin-top:24px;">După plată, creează cont sau loghează-te aici<br>pentru a accesa programul tău.</p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const sb = createClient('https://utljkuefjdvdpmmzxnoi.supabase.co','sb_publishable_dJNniaqWOEVQLDLFms6bDQ_zoaRJqvb')

// Dacă e deja logat, du-l direct pe dashboard
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = './dashboard.html'
})

window.doLogin = async function() {
  const email = document.getElementById('lEmail').value.trim()
  const pass = document.getElementById('lPass').value
  if (!email ||!pass) return showMsg('Completează email și parola.','err')
  const btn = document.getElementById('lSubmit')
  btn.disabled = true
  showMsg('Se conectează...','ok')
  const { error } = await sb.auth.signInWithPassword({ email, password: pass })
  btn.disabled = false
  if (error) { showMsg(error.message,'err'); return }
  showMsg('✅ Bine ai venit!','ok')
  setTimeout(() => window.location.href = './dashboard.html', 1000)
}

window.doRegister = async function() {
  const email = document.getElementById('rEmail').value.trim()
  const pass = document.getElementById('rPass').value
  const passC = document.getElementById('rPassC').value
  if (!email ||!pass) return showMsg('Completează toate câmpurile.','err')
  if (pass!== passC) return showMsg('Parolele nu coincid.','err')
  if (pass.length < 6) return showMsg('Parola — minim 6 caractere.','err')
  showMsg('Se creează contul...','ok')
  const { error } = await sb.auth.signUp({
    email,
    password: pass,
    options: { emailRedirectTo: window.location.origin + '/dashboard.html' }
  })
  if (error) { showMsg(error.message,'err'); return }
  showMsg('✅ Cont creat! Verifică email-ul sau loghează-te.','ok')
  setTimeout(() => { switchTab('login'); document.getElementById('lEmail').value = email }, 2200)
}

window.doForgot = async function() {
  const email = document.getElementById('fEmail').value.trim()
  if (!email) return showMsg('Introdu email-ul.','err')
  showMsg('Se trimite...','ok')
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  })
  if (error) { showMsg(error.message,'err'); return }
  showMsg('✅ Link trimis pe email!','ok')
}

function showMsg(text, type) {
  const el = document.getElementById('mMsg')
  el.style.display = 'block'
  el.className = 'msg ' + type
  el.textContent = text
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'))
  if(tab === 'login') {
    document.getElementById('tabL').classList.add('active')
    document.getElementById('fLogin').classList.add('active')
  } else if(tab === 'register') {
    document.getElementById('tabR').classList.add('active')
    document.getElementById('fRegister').classList.add('active')
  } else if(tab === 'forgot') {
    document.getElementById('fForgot').classList.add('active')
  }
  document.getElementById('mMsg').style.display = 'none'
}
</script>
</body>
</html>
